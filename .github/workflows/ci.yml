name: "CI"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Format check
        run: nix fmt -- --ci

      - name: Install dependencies
        run: | 
          nix profile add .#ci
          pnpm install

      - name: Lint and type check
        run: pnpm lint

      - name: Run tests
        run: pnpm test
